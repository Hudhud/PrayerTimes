name: Build, publish and deploy project to FTP server

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Install dependencies
        run: dotnet restore --use-lock-file

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish ./Web/Web.csproj
          --configuration Release
          --framework net8.0
          --output ./publish
          --runtime win-x86
          --self-contained true
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false

      - name: Test with .NET
        run: dotnet test

      - name: Deploy to IIS
        uses: ChristopheLav/iis-deploy@v1.1.1
        with:
          website-name: 'salahtimes.dk'
          msdeploy-service-url: 'http://salahtimes.dk.nt38.unoeuro-server.com:8172'
          msdeploy-username: 'salahtimes.dk'
          msdeploy-password: ${{ secrets.DATABASE_PASSWORD }}
          source-path: './publish'
          skip-extra-files: false
