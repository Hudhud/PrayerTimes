name: Build, publish and deploy project to Web Deploy server

on:
  push:
    branches:
      - master

jobs:
  build_and_deploy:
    runs-on: windows-latest

    env:
      CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore ./Web/Web.csproj --runtime win-x86

      - name: Build
        run: dotnet build ./Web/Web.csproj --configuration Release --runtime win-x86 --no-restore

      - name: Inject connection string
        shell: pwsh
        run: |
          $config = @{
            ConnectionStrings = @{
              DefaultConnection = $env:CONNECTION_STRING
            }
          } | ConvertTo-Json -Depth 10

          Set-Content -Path ./Web/appsettings.Production.json -Value $config

      - name: Publish
        run: >
          dotnet publish ./Web/Web.csproj
          --configuration Release
          --framework net8.0
          --output ./publish
          --runtime win-x86
          --self-contained true
          --no-restore
          -p:PublishTrimmed=false
          -p:PublishSingleFile=false

      - name: Show publish output size
        shell: pwsh
        run: |
          Write-Host "Total publish size:"
          Get-ChildItem ./publish -Recurse -File | Measure-Object -Property Length -Sum

          Write-Host "File count:"
          (Get-ChildItem ./publish -Recurse -File).Count

      - name: Deploy with msdeploy
        shell: pwsh
        run: |
          $msdeploy = "${env:ProgramFiles(x86)}\IIS\Microsoft Web Deploy V3\msdeploy.exe"

          if (!(Test-Path $msdeploy)) {
            throw "msdeploy.exe not found at $msdeploy"
          }

          $source = "-source:contentPath=$PWD\publish"
          $destination = "-dest:contentPath=salahtimes.dk/public_html,computerName=https://nt38.unoeuro.com:8172/MsDeploy.axd,userName=salahtimes.dk,password=${{ secrets.DATABASE_PASSWORD }},authType=Basic"

          $arguments = @(
            "-verb:sync"
            $source
            $destination
            "-allowUntrusted"
            "-enableRule:AppOffline"
            "-retryAttempts:2"
            "-verbose"
          )

          & $msdeploy @arguments
